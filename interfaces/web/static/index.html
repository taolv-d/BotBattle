<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BotBattle &#x72FC;&#x4EBA;&#x6740;&#x540E;&#x53F0;&#x9875;</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div>
        <h1>BotBattle &#x72FC;&#x4EBA;&#x6740;&#x540E;&#x53F0;&#x9875;</h1>
        <p id="subtitle">&#x4E0A;&#x5E1D;&#x89C6;&#x89D2;&#x8FD0;&#x884C;&#x76D1;&#x63A7;&#x4E0E;&#x8C03;&#x8BD5;&#x89C2;&#x5BDF;</p>
      </div>
      <div class="actions">
        <button id="createBtn">&#x521B;&#x5EFA;&#x5BF9;&#x5C40;</button>
        <button id="startBtn">&#x542F;&#x52A8;&#x5BF9;&#x5C40;</button>
        <button id="refreshBtn">&#x7ACB;&#x5373;&#x5237;&#x65B0;</button>
      </div>
    </header>

    <section class="panel controls">
      <div class="control-row">
        <label>&#x6A21;&#x5F0F;
          <select id="mode">
            <option value="observer">&#x89C2;&#x5BDF;&#x6A21;&#x5F0F;</option>
            <option value="player">&#x73A9;&#x5BB6;&#x6A21;&#x5F0F;&#xFF08;&#x540E;&#x7EED;&#x5B9E;&#x73B0;&#xFF09;</option>
          </select>
        </label>
        <label>&#x771F;&#x4EBA;&#x5EA7;&#x4F4D;
          <input id="humanPlayerId" type="number" min="1" placeholder="&#x73A9;&#x5BB6;&#x6A21;&#x5F0F;&#x542F;&#x7528;&#x540E;&#x53EF;&#x586B;&#x5199;">
        </label>
        <label>&#x590D;&#x76D8;&#x6A21;&#x5F0F;
          <select id="reviewMode">
            <option value="summary">summary</option>
            <option value="detailed" selected>detailed</option>
            <option value="analysis">analysis</option>
          </select>
        </label>
        <label class="checkbox">
          <input id="reviewEnabled" type="checkbox" checked>
          &#x542F;&#x7528;&#x590D;&#x76D8;
        </label>
        <label class="checkbox">
          <input id="detectLoopholes" type="checkbox">
          &#x68C0;&#x6D4B;&#x6F0F;&#x6D1E;
        </label>
      </div>
    </section>

    <section class="panel status-bar" id="statusBar">
      <div class="status-item"><span>Session</span><strong id="sessionId">-</strong></div>
      <div class="status-item"><span>Game</span><strong id="gameId">-</strong></div>
      <div class="status-item"><span>Lifecycle</span><strong id="lifecycleStatus">-</strong></div>
      <div class="status-item"><span>Phase</span><strong id="phase">-</strong></div>
      <div class="status-item"><span>Day/Night</span><strong id="dayNight">-</strong></div>
      <div class="status-item"><span>President</span><strong id="presidentId">-</strong></div>
      <div class="status-item"><span>Alive</span><strong id="aliveCount">-</strong></div>
    </section>

    <main class="layout">
      <section class="panel players-panel">
        <div class="panel-header">
          <h2>&#x73A9;&#x5BB6;&#x9762;&#x677F;</h2>
        </div>
        <table class="players-table">
          <thead>
            <tr>
              <th>&#x5EA7;&#x4F4D;</th>
              <th>&#x5B58;&#x6D3B;</th>
              <th>&#x8EAB;&#x4EFD;</th>
              <th>&#x9635;&#x8425;</th>
              <th>&#x8B66;&#x957F;</th>
            </tr>
          </thead>
          <tbody id="playersBody"></tbody>
        </table>
      </section>

      <section class="panel timeline-panel">
        <div class="panel-header">
          <h2>&#x4E8B;&#x4EF6;&#x65F6;&#x95F4;&#x7EBF;</h2>
          <div class="filters">
            <select id="eventFilter">
              <option value="all">&#x5168;&#x90E8;&#x4E8B;&#x4EF6;</option>
              <option value="speech">&#x53D1;&#x8A00;&#x76F8;&#x5173;</option>
              <option value="vote">&#x6295;&#x7968;&#x76F8;&#x5173;</option>
              <option value="night">&#x591C;&#x665A;&#x76F8;&#x5173;</option>
              <option value="system">&#x7CFB;&#x7EDF;&#x76F8;&#x5173;</option>
            </select>
          </div>
        </div>
        <div class="timeline" id="timeline"></div>
      </section>
    </main>

    <section class="panel speech-feed-panel">
      <div class="panel-header">
        <div>
          <h2>&#x7FA4;&#x804A;&#x89C6;&#x56FE;</h2>
          <p class="panel-subtitle">&#x6309;&#x804A;&#x5929;&#x65B9;&#x5F0F;&#x96C6;&#x4E2D;&#x5C55;&#x793A;&#x73A9;&#x5BB6;&#x53D1;&#x8A00;&#x4E0E;&#x5173;&#x952E;&#x7CFB;&#x7EDF;&#x64AD;&#x62A5;</p>
        </div>
      </div>
      <div class="speech-feed" id="speechFeed"></div>
    </section>

    <section class="lower-grid">
      <section class="panel review-panel">
        <div class="panel-header"><h2>&#x590D;&#x76D8;&#x72B6;&#x6001;</h2></div>
        <div id="reviewStatus">-</div>
      </section>
      <section class="panel error-panel">
        <div class="panel-header"><h2>&#x9519;&#x8BEF; / &#x7B49;&#x5F85;&#x72B6;&#x6001;</h2></div>
        <pre id="errorBox">&#x6682;&#x65E0;&#x9519;&#x8BEF;</pre>
      </section>
    </section>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
